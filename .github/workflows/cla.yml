# SPDX-License-Identifier: MIT
# CLA enforcement via cla-assistant-lite
# Contributors accept by commenting "I have read and agree to the CLA."
# Signatures are stored in the repo at .github/cla-signatures.json

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    if: |
      (github.event.comment.body == 'I have read and agree to the CLA.') ||
      (github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: use a PAT if you want the bot to push signatures
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: bot*
          # The exact comment contributors must post to accept
          signed-commit-message: |
            CLA signed by @${{ github.event.comment.user.login }}
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, please accept the
            [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            To accept, reply to this PR with:

            ```
            I have read and agree to the CLA.
            ```

            No email or DocuSign required — your GitHub username is sufficient.
          custom-pr-sign-comment: "I have read and agree to the CLA."
          custom-allsigned-prcomment: "All contributors have accepted the CLA. Thank you!"
          lock-pullrequest-aftermerge: false
